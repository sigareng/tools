<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools Dashboard Hub</title>
    
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --bg-card: rgba(255, 255, 255, 0.6);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: rgba(255, 255, 255, 0.4);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        * {
            box-sizing: border-box;
            outline: none;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* Background abstrak modern */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Overlay Pattern Halus */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: -1;
        }

        /* Container Utama */
        .container {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
            flex: 1;
        }

        /* Header & Search */
        .header-section {
            text-align: center;
            margin-bottom: 30px;
            background: var(--bg-glass);
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
        }

        .header-section h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            background: -webkit-linear-gradient(45deg, var(--primary), #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .header-section p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .search-box {
            margin-top: 20px;
            position: relative;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 50px;
            border-radius: 50px;
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.9);
            font-family: inherit;
            font-size: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
        }

        .search-box i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* Grid Tools */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding-bottom: 40px;
        }

        /* Kartu Tool */
        .card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            padding: 24px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            background: #ffffff;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-color: transparent;
        }

        .card-icon {
            width: 50px;
            height: 50px;
            background: rgba(79, 70, 229, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--primary);
            margin-bottom: 16px;
            transition: 0.3s;
        }

        .card:hover .card-icon {
            background: var(--primary);
            color: white;
        }

        .card h3 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card span {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Loading Skeleton Animation */
        .skeleton {
            height: 140px;
            background: rgba(255,255,255,0.5);
            border-radius: 16px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        footer a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        /* Error Message */
        .error-msg {
            grid-column: 1 / -1;
            text-align: center;
            background: rgba(255, 200, 200, 0.2);
            color: #b91c1c;
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            display: none;
        }

        /* Responsif Mobile */
        @media (max-width: 600px) {
            .header-section { padding: 20px; }
            .header-section h1 { font-size: 1.5rem; }
            .tools-grid { grid-template-columns: 1fr; } /* 1 Kolom di HP */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header & Search -->
        <header class="header-section">
            <h1>Tools Collection</h1>
            <p>Kumpulan alat web sederhana untuk produktivitas harian</p>
            
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Cari alat (misal: converter, password)...">
            </div>
        </header>

        <!-- Grid Container -->
        <main class="tools-grid" id="toolsGrid">
            <!-- Skeleton Loader (tampilan loading) -->
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </main>
    </div>

    <footer>
        <p>&copy; <span id="year"></span> <a href="#" id="ownerLink">Owner</a>. Dibuat dengan ❤️.</p>
    </footer>

    <script>
        // ==========================================
        // KONFIGURASI (Edit Bagian Ini)
        // ==========================================
        const CONFIG = {
            owner: 'sigareng',      // Username GitHub
            repo: 'tools',          // Nama Repository
            ignore: ['index.html', '404.html', 'style.css', 'README.md'], // File yang diabaikan
            // List Tool Manual (Untuk link eksternal agar tidak hilang)

            manualTools: [
                {
                  "name": "HTML Decode & Encode",
                  "url": "./count.html",
                  "icon": "fa-code",
                  "type": "Eksternal"
                },
                {
                  "name": "Replace Line Breaks & Reversed",
                  "url": "./linebreaks.html",
                  "icon": "fa-code",
                  "type": "Eksternal"
                },
                {
                  "name": "Password_hash()",
                  "url": "./pwd.html",
                  "icon": "fa-code",
                  "type": "Eksternal"
                },
                {
                  "name": "JSON Path Preview",
                  "url": "./jsonpath.html",
                  "icon": "fa-code",
                  "type": "Eksternal"
                },
                {
                  "name": "Image - Url to base64",
                  "url": "https://sigareng.github.io/imgtobase64/",
                  "icon": "fa-code",
                  "type": "Eksternal"
                },
                {
                  "name": "HTML Live Preview",
                  "url": "./html-preview.html",
                  "icon": "fa-code",
                  "type": "Eksternal"
                },
                {
                  "name": "BeautyHTML",
                  "url": "./beautyhtml.html",
                  "icon": "fa-code",
                  "type": "Eksternal"
                },
                {
                  "name": "SVG Convert",
                  "url": "./svg-convert.html",
                  "icon": "fa-code",
                  "type": "Eksternal"
                },
                {
                  "name": "SVG Editor",
                  "url": "./svg-editor.html",
                  "icon": "fa-code",
                  "type": "Eksternal"
                }
            ]
        };

        // ==========================================
        // LOGIKA PROGRAM
        // ==========================================
        
        // Mapping Ikon Otomatis berdasarkan kata kunci di nama file
        // Anda bisa menambahkannya sendiri agar lebih menarik
        const iconMap = {
            'pdf': 'fa-file-pdf',
            'image': 'fa-image',
            'img': 'fa-image',
            'jpg': 'fa-image',
            'png': 'fa-image',
            'converter': 'fa-exchange-alt',
            'calc': 'fa-calculator',
            'calculator': 'fa-calculator',
            'color': 'fa-palette',
            'json': 'fa-code',
            'text': 'fa-file-alt',
            'todo': 'fa-check-square',
            'password': 'fa-key',
            'generator': 'fa-magic',
            'downloader': 'fa-download',
            'youtube': 'fa-youtube',
            'music': 'fa-music',
            'video': 'fa-video',
            'weather': 'fa-cloud-sun'
        };

        const grid = document.getElementById('toolsGrid');
        const searchInput = document.getElementById('searchInput');

        // 1. Setup Tahun & Footer
        document.getElementById('year').textContent = new Date().getFullYear();
        document.getElementById('ownerLink').textContent = CONFIG.owner;
        document.getElementById('ownerLink').href = `https://github.com/${CONFIG.owner}`;

        // 2. Fungsi mendapatkan ikon
        function getIcon(name) {
            const lowerName = name.toLowerCase();
            for (const key in iconMap) {
                if (lowerName.includes(key)) {
                    return iconMap[key];
                }
            }
            return 'fa-tools'; // Ikon default jika tidak cocok
        }

        // 3. Fungsi Render Card ke HTML
        function createCard(name, url, type = "Tool", customIcon = null) {
            const icon = customIcon || getIcon(name);
            // Format nama agar rapi (hapus .html dan ganti - dengan spasi)
            const displayName = name.replace('.html', '').replace(/-/g, ' ').replace(/_/g, ' ');
            
            return `
                <a href="${url}" class="card" target="${url.startsWith('http') ? '_blank' : '_self'}">
                    <div class="card-icon">
                        <i class="fas ${icon}"></i>
                    </div>
                    <h3>${displayName.charAt(0).toUpperCase() + displayName.slice(1)}</h3>
                    <span>${type}</span>
                </a>
            `;
        }

        // 4. Fungsi Utama Fetch Data
        async function initDashboard() {
            let allHtml = '';

            try {
                // Fetch isi repo GitHub
                const res = await fetch(
                    `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/`
                );

                if (!res.ok) throw new Error('Gagal mengambil data repo');

                const files = await res.json();

                // Render file HTML dari GitHub
                files.forEach(file => {
                    if (
                        file.name.endsWith('.html') &&
                        !CONFIG.ignore.includes(file.name)
                    ) {
                        allHtml += createCard(
                            file.name,
                            `./${file.name}`,
                            "Web App"
                        );
                    }
                });

            } catch (error) {
                console.error("Error:", error);

                // Jika gagal baru pakai manualTools
                CONFIG.manualTools.forEach(tool => {
                    allHtml += createCard(
                        tool.name,
                        tool.url,
                        tool.type,
                        tool.icon
                    );
                });

                // Pesan error
                allHtml += `
                    <div class="error-msg" style="display:block">
                        Gagal memuat otomatis dari GitHub 
                        (Rate Limit / Network).
                        Menampilkan manual tools saja.
                    </div>
                `;
            }

            // Render ke halaman
            grid.innerHTML = allHtml;
        }

        // 5. Fitur Pencarian (Filter Realtime)
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            
            cards.forEach(card => {
                const title = card.querySelector('h3').textContent.toLowerCase();
                if (title.includes(term)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        });

        // Jalankan saat load
        initDashboard();

    </script>
</body>
</html>
