<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SVG to Apple Icon Converter - Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 850px; margin: 20px auto; padding: 20px; background: #f4f7f6; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 180px; font-family: 'Courier New', monospace; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; resize: vertical; }
        .controls { margin: 20px 0; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; background: #eef2f3; padding: 15px; border-radius: 8px; }
        .preview-container { border: 2px dashed #3dbe5e; padding: 20px; text-align: center; background: #fff; margin-top: 20px; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #svgPreview { max-width: 300px; max-height: 300px; }
        button { padding: 12px 25px; background: #3dbe5e; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #2e9147; transform: translateY(-1px); }
        select, input[type="number"] { padding: 10px; border-radius: 6px; border: 1px solid #ccc; outline: none; }
        .hidden { display: none; }
        label { font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>SVG to PNG Icon Generator</h2>
        <p>Edit SVG, pilih ukuran Apple, atau masukkan ukuran custom sendiri.</p>

        <textarea id="svgInput" placeholder="Tempel kode <svg>...</svg> di sini...">
<!-- Contoh default jika kosong -->
<svg viewBox="0 0 100 100" xmlns="http://w3.org">
  <circle cx="50" cy="50" r="40" fill="#3dbe5e" />
  <text x="50" y="60" text-anchor="middle" fill="white" font-size="30" font-weight="bold">GO</text>
</svg></textarea>

        <div class="controls">
            <label>Ukuran:</label>
            <select id="sizeSelect" onchange="toggleCustomSize()">
                <option value="152">152x152 (iPad Retina)</option>
                <option value="167">167x167 (iPad Pro)</option>
                <option value="180" selected>180x180 (iPhone Retina)</option>
                <option value="512">512x512 (High Res)</option>
                <option value="custom">-- Ukuran Custom --</option>
            </select>

            <div id="customSizeWrapper" class="hidden">
                <input type="number" id="customWidth" placeholder="L" style="width: 70px;"> x 
                <input type="number" id="customHeight" placeholder="P" style="width: 70px;"> px
            </div>

            <button onclick="downloadPNG()">Simpan PNG</button>
        </div>

        <div class="preview-container">
            <p style="margin-bottom: 10px; color: #888;">Live Preview</p>
            <div id="svgPreview"></div>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const svgInput = document.getElementById('svgInput');
        const svgPreview = document.getElementById('svgPreview');
        const sizeSelect = document.getElementById('sizeSelect');
        const customSizeWrapper = document.getElementById('customSizeWrapper');
        const canvas = document.getElementById('canvas');

        // Render preview awal
        svgPreview.innerHTML = svgInput.value;

        svgInput.addEventListener('input', () => {
            svgPreview.innerHTML = svgInput.value;
        });

        function toggleCustomSize() {
            if (sizeSelect.value === 'custom') {
                customSizeWrapper.classList.remove('hidden');
            } else {
                customSizeWrapper.classList.add('hidden');
            }
        }

        function downloadPNG() {
            const svgData = svgInput.value;
            if (!svgData) return alert("Tempel kode SVG dulu!");

            let width, height;
            if (sizeSelect.value === 'custom') {
                width = parseInt(document.getElementById('customWidth').value);
                height = parseInt(document.getElementById('customHeight').value);
                if (!width || !height) return alert("Masukkan angka ukuran custom!");
            } else {
                width = height = parseInt(sizeSelect.value);
            }

            const ctx = canvas.getContext('2d');
            canvas.width = width;
            canvas.height = height;

            const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
            const url = URL.createObjectURL(svgBlob);
            
            const img = new Image();
            img.onload = function() {
                // Background putih solid
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, width, height);

                // Gambar SVG ke canvas (skala otomatis)
                ctx.drawImage(img, 0, 0, width, height);

                const pngUrl = canvas.toDataURL("image/png");
                const downloadLink = document.createElement("a");
                downloadLink.href = pngUrl;
                downloadLink.download = `icon-${width}x${height}.png`;
                downloadLink.click();
                
                URL.revokeObjectURL(url);
            };
            img.src = url;
        }
    </script>
</body>
</html>
