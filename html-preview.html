<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>HTML Live Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.4/ace.js"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    #editor {
        width: 50%;
        height: 100vh;
    }

    #preview-container {
        width: 50%;
        height: 100vh;
        position: relative;
        border-left: 2px solid #ddd;
    }

    #preview {
        width: 100%;
        height: 100%;
        border: none;
    }

    .open-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        background: white;
        border-radius: 8px;
        padding: 6px;
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        transition: 0.2s;
    }

    .open-btn:hover {
        background: #f0f0f0;
        transform: scale(1.1);
    }
</style>
</head>
<body>

<div id="editor"></div>

<div id="preview-container">
    <!-- SVG Icon -->
    <div class="open-btn" onclick="openNewWindow()" title="Open Full Preview">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 3h7v7"></path>
            <path d="M10 14L21 3"></path>
            <path d="M21 14v7h-7"></path>
            <path d="M3 10v11h11"></path>
        </svg>
    </div>

    <iframe id="preview"></iframe>
</div>

<script>
    // Inisialisasi Ace Editor
    var editor = ace.edit("editor");
    editor.setTheme("ace/theme/monokai");
    editor.session.setMode("ace/mode/html");
    editor.setOptions({
        fontSize: "14px",
        showLineNumbers: true,
        tabSize: 2,
        useSoftTabs: true
    });

    // Default HTML
    editor.setValue(`<!DOCTYPE html>
<html>
<head>
<title>Live Preview</title>
<style>
body { font-family: Arial; background: #f4f4f4; padding:20px;}
h1 { color: #3498db; }
</style>
</head>
<body>
<h1>Hello World!</h1>
<p>Edit kode di kiri dan lihat perubahan di sini.</p>
</body>
</html>`, -1);

    var preview = document.getElementById("preview");

    function updatePreview() {
        var code = editor.getValue();
        preview.srcdoc = code;
    }

    // Realtime update
    editor.session.on('change', function(){
        updatePreview();
    });

    // Initial render
    updatePreview();

    // Open preview in new window
    function openNewWindow() {
        var newWindow = window.open();
        newWindow.document.open();
        newWindow.document.write(editor.getValue());
        newWindow.document.close();
    }
</script>

</body>
</html>
